name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Component
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          target: wasm32-wasip2

      - name: Install cargo-component
        run: cargo install cargo-component --locked

      - name: Install wasm-tools
        run: cargo install wasm-tools --locked

      - name: Build component
        run: cargo component build --release --target wasm32-wasip2

      - name: Validate component
        run: wasm-tools validate target/wasm32-wasip2/release/compression_multiplexer.wasm

      - name: Get component info
        run: |
          echo "Component size:"
          ls -lh target/wasm32-wasip2/release/compression_multiplexer.wasm
          echo ""
          echo "Component exports:"
          wasm-tools component wit target/wasm32-wasip2/release/compression_multiplexer.wasm

      - name: Create release archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p release
          cp target/wasm32-wasip2/release/compression_multiplexer.wasm release/
          cp README.md LICENSE release/
          cp -r wit release/
          cd release
          tar czf ../compression-multiplexer-${VERSION}.tar.gz *
          cd ..
          sha256sum compression-multiplexer-${VERSION}.tar.gz > compression-multiplexer-${VERSION}.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            compression-multiplexer-*.tar.gz
            compression-multiplexer-*.tar.gz.sha256
            target/wasm32-wasip2/release/compression_multiplexer.wasm
          body: |
            ## Compression Multiplexer ${{ github.ref_name }}

            Production-ready compression multiplexer component for WebAssembly.

            ### Features
            - Runtime algorithm selection (Store, DEFLATE, BZIP2, LZMA)
            - 96% coverage of real-world ZIP files
            - Optimized for size (277KB)
            - 19/19 tests passing

            ### Files
            - `compression_multiplexer.wasm` - The component binary
            - `compression-multiplexer-*.tar.gz` - Full distribution with WIT files
            - `*.sha256` - SHA-256 checksums

            ### Usage

            ```bash
            # Validate component
            wasm-tools validate compression_multiplexer.wasm

            # Use with orchestration
            composectl emit build your-plan.cbor -o output.wasm

            # Or use with wasm-tools compose
            wasm-tools compose zip-provider.wasm -d compression_multiplexer.wasm -o zip-complete.wasm
            ```

            ### Documentation
            - [Main README](https://github.com/your-org/compression-multiplexer)
            - [Architecture](https://github.com/your-org/compressed-vfs-wasm/blob/main/ARCHITECTURE.md)
            - [Examples](https://github.com/your-org/compression-multiplexer/tree/master/examples)

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true
